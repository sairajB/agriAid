<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - AgriAid</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.16/tailwind.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='images/logo.svg') }}"
      type="image/x-icon" />
    <style>
      body {
        background: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
        min-height: 100vh;
      }
      .contact-container {
        max-width: 800px;
        margin: 50px auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(45, 106, 79, 0.2);
        overflow: hidden;
      }
      .form-input {
        transition: all 0.3s ease;
      }
      .form-input:focus {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2);
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a href="/"
          ><img
            src="{{ url_for('static', filename='images/logo.svg') }}"
            width="64px"
            height="64px"
        /></a>
        <a class="navbar-brand ms-3 text-success" href="/">PlantCare</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="me-5 collapse navbar-collapse justify-content-end"
          id="navbarNavDropdown ">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="/main" class="btn btn-outline-success" role="button"
                >Get Started</a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link text-secondary" href="/#features">Features</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-secondary" href="/#contact">Contact Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <form method="POST">
        <div class="form-group">
          <input
            type="email"
            placeholder="Enter Email..."
            name="email"
            class="form-control" />
        </div>
        <div class="mb-3">
          <textarea
            class="form-control"
            name="message"
            id="exampleFormControlTextarea1"
            rows="3"
            placeholder="Your Message..."></textarea>
        </div>
        <div class="form-btn">
          <input
            type="submit"
            value="Send Your Message"
            name="submit"
            class="btn btn-outline-success" />
        </div>
      </form>
    </div>
  </body>
</html>
