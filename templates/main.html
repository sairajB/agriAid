<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriAid - Detect Disease</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/enhancements.css') }}" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: #0a0e27;
        color: #fff;
        overflow: hidden;
      }

      .wrapper {
        display: flex;
        height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 280px;
        background: rgba(255, 255, 255, 0.03);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
      }

      .logo {
        display: flex;
        align-items: center;
        margin-bottom: 40px;
        gap: 12px;
      }

      .logo img {
        width: 40px;
        height: 40px;
        filter: brightness(0) invert(1);
      }

      .logo-text {
        font-size: 24px;
        font-weight: 700;
        background: linear-gradient(135deg, #4ade80, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
      }

      .sidebar-link {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        border-radius: 12px;
        transition: all 0.3s ease;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .sidebar-link:hover {
        background: rgba(74, 222, 128, 0.1);
        color: #4ade80;
        transform: translateX(5px);
      }

      .sidebar-link i {
        margin-right: 12px;
        font-size: 20px;
      }

      .sidebar-footer {
        margin-top: auto;
      }

      /* Main Content */
      .main {
        flex: 1;
        background: radial-gradient(
          ellipse at top right,
          #1e3a8a 0%,
          #0a0e27 50%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .main::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(74, 222, 128, 0.1),
          transparent 70%
        );
        top: -300px;
        right: -300px;
        border-radius: 50%;
        animation: float 15s infinite;
      }

      .main::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(34, 211, 238, 0.1),
          transparent 70%
        );
        bottom: -250px;
        left: -250px;
        border-radius: 50%;
        animation: float 20s infinite reverse;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
        33% {
          transform: translate(30px, -30px) rotate(120deg);
        }
        66% {
          transform: translate(-20px, 20px) rotate(240deg);
        }
      }

      .upload-section {
        text-align: center;
        z-index: 10;
      }

      .upload-title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #fff, #4ade80);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .upload-subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 40px;
      }

      .drop-zone {
        border: 2px dashed rgba(74, 222, 128, 0.4);
        border-radius: 20px;
        width: 500px;
        height: 350px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        position: relative;
        overflow: hidden;
      }

      .drop-zone::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          rgba(74, 222, 128, 0.05),
          rgba(34, 211, 238, 0.05)
        );
        opacity: 0;
        transition: opacity 0.4s;
      }

      .drop-zone:hover::before {
        opacity: 1;
      }

      .drop-zone:hover {
        border-color: #4ade80;
        transform: translateY(-5px);
        box-shadow: 0 20px 60px rgba(74, 222, 128, 0.2);
      }

      .drop-zone.drag-over {
        border-color: #22d3ee;
        background: rgba(34, 211, 238, 0.1);
        transform: scale(1.02);
      }

      .drop-zone__prompt {
        color: rgba(255, 255, 255, 0.7);
        font-size: 18px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        z-index: 1;
      }

      .drop-zone__prompt i {
        font-size: 48px;
        color: #4ade80;
        margin-bottom: 10px;
      }

      .drop-zone__input {
        display: none;
      }

      .drop-zone__thumb {
        width: 100%;
        height: 100%;
        border-radius: 18px;
        overflow: hidden;
        background-size: cover;
        background-position: center;
        position: relative;
      }

      .drop-zone__thumb::after {
        content: attr(data-label);
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 12px;
        color: #ffffff;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
        font-size: 14px;
        text-align: center;
      }

      .detect-button {
        margin-top: 40px;
        padding: 16px 50px;
        font-size: 18px;
        font-weight: 600;
        background: linear-gradient(135deg, #4ade80, #22d3ee);
        color: #0a0e27;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 30px rgba(74, 222, 128, 0.4);
        position: relative;
        overflow: hidden;
      }

      .detect-button::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }

      .detect-button:hover::before {
        width: 400px;
        height: 400px;
      }

      .detect-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(74, 222, 128, 0.6);
      }

      .detect-button:active {
        transform: translateY(-1px);
      }

      @media (max-width: 768px) {
        .wrapper {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .drop-zone {
          width: 90vw;
          height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <aside class="sidebar">
        <div class="logo">
          <img
            src="{{ url_for('static', filename='images/logo.svg') }}"
            alt="AgriAid Logo" />
          <a href="/" class="logo-text">AgriAid</a>
        </div>
        <nav>
          <a href="/market" class="sidebar-link">
            <i class="bi bi-shop"></i> Market
          </a>
        </nav>
        <div class="sidebar-footer">
          <a href="/" class="sidebar-link">
            <i class="bi bi-house-door"></i> Back to Home
          </a>
        </div>
      </aside>
      <main class="main">
        <div class="upload-section">
          <h1 class="upload-title">Detect Plant Disease</h1>
          <p class="upload-subtitle">
            Upload an image to identify diseases with AI
          </p>
          <form action="/submit" method="POST" enctype="multipart/form-data">
            <div class="drop-zone">
              <span class="drop-zone__prompt">
                <i class="bi bi-cloud-upload"></i>
                <div>Drop file here or click to upload</div>
                <small style="color: rgba(255, 255, 255, 0.5)"
                  >Supported formats: JPG, PNG</small
                >
              </span>
              <input
                type="file"
                name="image"
                class="drop-zone__input"
                accept="image/*" />
            </div>
            <button type="submit" class="detect-button">Analyze Plant</button>
          </form>
        </div>
      </main>
    </div>

    <script>
      // File Upload Functionality
      document.querySelectorAll(".drop-zone__input").forEach((inputElement) => {
        const dropZoneElement = inputElement.closest(".drop-zone");

        dropZoneElement.addEventListener("click", () => inputElement.click());
        inputElement.addEventListener("change", () => {
          if (inputElement.files.length) {
            updateThumbnail(dropZoneElement, inputElement.files[0]);
          }
        });

        dropZoneElement.addEventListener("dragover", (e) => {
          e.preventDefault();
          dropZoneElement.classList.add("drag-over");
        });

        ["dragleave", "dragend"].forEach((type) => {
          dropZoneElement.addEventListener(type, () => {
            dropZoneElement.classList.remove("drag-over");
          });
        });

        dropZoneElement.addEventListener("drop", (e) => {
          e.preventDefault();
          if (e.dataTransfer.files.length) {
            inputElement.files = e.dataTransfer.files;
            updateThumbnail(dropZoneElement, e.dataTransfer.files[0]);
          }
          dropZoneElement.classList.remove("drag-over");
        });
      });

      function updateThumbnail(dropZoneElement, file) {
        let thumbnailElement =
          dropZoneElement.querySelector(".drop-zone__thumb");
        if (dropZoneElement.querySelector(".drop-zone__prompt")) {
          dropZoneElement.querySelector(".drop-zone__prompt").remove();
        }
        if (!thumbnailElement) {
          thumbnailElement = document.createElement("div");
          thumbnailElement.classList.add("drop-zone__thumb");
          dropZoneElement.appendChild(thumbnailElement);
        }
        thumbnailElement.dataset.label = file.name;
        if (file.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => {
            thumbnailElement.style.backgroundImage = `url('${reader.result}')`;
          };
        } else {
          thumbnailElement.style.backgroundImage = null;
        }
      }
    </script>
  </body>
</html>
